version: "0.1"
name: ollama_summarize
providers:
  ollama:
    type: ollama
    base_url: http://localhost:11434
inputs:
  text:
    type: string
    required: true
steps:
  - id: summarize
    uses: ai.generate
    with:
      # model: ollama:llama3.2:3b
      model: ollama:gemma3:4b
      prompt: |
        Summarize this text in one sentence:

        {{ inputs.text }}
outputs:
  summary: "{{ steps.summarize.output.text }}"
