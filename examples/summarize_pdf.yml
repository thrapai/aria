version: "0.1"
name: summarize_pdf
providers:
  ollama:
    type: ollama
    base_url: http://localhost:11434
inputs:
  path:
    type: file
    required: true
steps:
  - id: extract
    uses: docling.convert
    with:
      path: "{{ inputs.path }}"
  - id: summarize
    uses: ai.generate
    with:
      model: ollama:gemma3:4b
      prompt: |
        Summarize this document in 5 bullet points:

        {{ steps.extract.output.text }}
  - id: write_summary
    uses: file.write
    with:
      path: summary.txt
      content: "{{ steps.summarize.output.text }}"

outputs:
  summary_file: "{{ steps.write_summary.output.path }}"
